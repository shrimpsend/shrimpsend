# 线上环境配置示例 - 复制为 application-prod.yml（gitignored）或通过 ops 仓 sync
# 激活：SPRING_PROFILES_ACTIVE=prod

spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ultrasend?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}"
    username: "${SPRING_DATASOURCE_USERNAME:root}"
    password: "${SPRING_DATASOURCE_PASSWORD:CHANGE_ME}"

app:
  admin:
    # 逗号分隔；须与 web NEXT_PUBLIC_ADMIN_EMAILS 一致
    emails: "admin@example.com"
  public-web-base-url: "${APP_PUBLIC_WEB_BASE_URL:https://example.com}"
  s3-docs-path: "${APP_S3_DOCS_PATH:/zh/docs/s3/overview}"
  datasource:
    sdt:
      url: "${APP_SDT_DATASOURCE_URL:}"
      driver-class-name: com.mysql.cj.jdbc.Driver
      username: "${APP_SDT_DATASOURCE_USERNAME:}"
      password: "${APP_SDT_DATASOURCE_PASSWORD:}"
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://localhost:3000}"
  messages:
    encryption:
      key-base64: "${APP_MESSAGES_ENCRYPTION_KEY_BASE64:CHANGE_ME_BASE64_32_BYTES}"
      allow-dev-fallback-key: ${APP_MESSAGES_ENCRYPTION_ALLOW_DEV_FALLBACK:false}
      migrate-on-startup: ${APP_MESSAGES_ENCRYPTION_MIGRATE_ON_STARTUP:false}
  jwt:
    access-secret: "${JWT_ACCESS_SECRET:CHANGE_ME}"
    refresh-secret: "${JWT_REFRESH_SECRET:CHANGE_ME}"
  membership:
    free-device-limit: 3
    alipay:
      return-url: "${ALIPAY_RETURN_URL:https://example.com/settings/membership}"
      public-key: "${ALIPAY_PUBLIC_KEY:}"
      mock-notify-enabled: false
      app-id: "${ALIPAY_APP_ID:}"
      private-key: "${ALIPAY_PRIVATE_KEY:}"
      alipay-public-key: "${ALIPAY_ALIPAY_PUBLIC_KEY:}"
      gateway: "https://openapi.alipay.com/gateway.do"
      notify-url: "${ALIPAY_NOTIFY_URL:https://api.example.com/api/membership/alipay/notify}"
    revenuecat:
      webhook-auth: "${REVENUECAT_WEBHOOK_AUTH:CHANGE_ME}"
    rc-product-mini: "ultrasend_mini_lifetime"
    rc-product-pro: "ultrasend_pro_lifetime"
    rc-product-pro-upgrade: "ultrasend_mini_to_pro_upgrade"
    rc-product-addon-5: "ultrasend_addon_5_devices"
    addon-price-cent: 4500
    addon-devices: 5
    reconcile-delay-ms: 300000

sendcloud:
  api-user: "${SENDCLOUD_API_USER:}"
  api-key: "${SENDCLOUD_API_KEY:CHANGE_ME}"
  from: "${SENDCLOUD_FROM:noreply@example.com}"
  from-name: "${SENDCLOUD_FROM_NAME:Ultrasend}"

tencent:
  sms:
    secret-id: "${TENCENT_SMS_SECRET_ID:}"
    secret-key: "${TENCENT_SMS_SECRET_KEY:}"
    sms-sdk-app-id: "${TENCENT_SMS_SDK_APP_ID:}"
    template-id: "${TENCENT_SMS_TEMPLATE_ID:}"
    sign-name: "${TENCENT_SMS_SIGN_NAME:}"

# 国内发行包上传（腾讯云 COS）；桶 CORS 见 docs/release-upload-direct.md
storage:
  s3:
    endpoint: "${STORAGE_S3_ENDPOINT:https://cos.ap-guangzhou.myqcloud.com}"
    region: "${STORAGE_S3_REGION:ap-guangzhou}"
    access-key-id: "${STORAGE_S3_ACCESS_KEY_ID:}"
    secret-access-key: "${STORAGE_S3_SECRET_ACCESS_KEY:}"
    bucket: "${STORAGE_S3_BUCKET:}"
    public-host: "${STORAGE_S3_PUBLIC_HOST:}"
    presign-expire-seconds: ${STORAGE_S3_PRESIGN_EXPIRE_SECONDS:1800}
    path-style-access-enabled: ${STORAGE_S3_PATH_STYLE:false}

centrifugo:
  url: http://localhost:8000
  http-api-key: "${CENTRIFUGO_HTTP_API_KEY:CHANGE_ME}"
  token-hmac-secret: "${CENTRIFUGO_TOKEN_HMAC_SECRET:CHANGE_ME}"
