# 海外集群（ShrimpSend）线上配置示例 - 复制为 application-prod-overseas.yml（gitignored）或通过 ops 仓 sync
# 激活：SPRING_PROFILES_ACTIVE=prod-overseas
# 请将 example.com / api.example.com 替换为你的自有域名（勿默认指向官方生产域名）。

spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/xiachuandb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC}"
    username: "${SPRING_DATASOURCE_USERNAME:CHANGE_ME}"
    password: "${SPRING_DATASOURCE_PASSWORD:CHANGE_ME}"

app:
  admin:
    # 逗号分隔；须与 web NEXT_PUBLIC_ADMIN_EMAILS 一致
    emails: "admin@example.com"
  public-web-base-url: "${APP_PUBLIC_WEB_BASE_URL:https://example.com}"
  s3-docs-path: "${APP_S3_DOCS_PATH:/en/docs/s3/overview}"
  datasource:
    sdt:
      url: ""
      username: ""
      password: ""
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS:https://example.com,https://api.example.com}"
  messages:
    encryption:
      key-base64: "${APP_MESSAGES_ENCRYPTION_KEY_BASE64:CHANGE_ME_BASE64_32_BYTES}"
      allow-dev-fallback-key: ${APP_MESSAGES_ENCRYPTION_ALLOW_DEV_FALLBACK:false}
      migrate-on-startup: ${APP_MESSAGES_ENCRYPTION_MIGRATE_ON_STARTUP:false}
  jwt:
    access-secret: "${JWT_ACCESS_SECRET:CHANGE_ME}"
    refresh-secret: "${JWT_REFRESH_SECRET:CHANGE_ME}"
  membership:
    free-device-limit: 3
    alipay:
      return-url: "https://example.com/settings/membership"
      public-key: ""
      mock-notify-enabled: false
      app-id: ""
      private-key: ""
      alipay-public-key: ""
      gateway: "https://openapi.alipay.com/gateway.do"
      notify-url: "https://api.example.com/api/membership/alipay/notify"
    revenuecat:
      webhook-auth: "${REVENUECAT_WEBHOOK_AUTH:CHANGE_ME}"
    rc-product-mini: "ultrasend_mini_lifetime"
    rc-product-pro: "ultrasend_pro_lifetime"
    rc-product-addon-5: "ultrasend_addon_5_devices"
    addon-price-cent: 4500
    addon-devices: 5
    reconcile-delay-ms: 300000
    overseas:
      rc-plus-monthly: "${OVERSEAS_RC_PLUS_MONTHLY:your_plus_monthly}"
      rc-plus-yearly: "${OVERSEAS_RC_PLUS_YEARLY:your_plus_yearly}"
      rc-pro-monthly: "${OVERSEAS_RC_PRO_MONTHLY:your_pro_monthly}"
      rc-pro-yearly: "${OVERSEAS_RC_PRO_YEARLY:your_pro_yearly}"
      rc-ultra-monthly: "${OVERSEAS_RC_ULTRA_MONTHLY:your_ultra_monthly}"
      rc-ultra-yearly: "${OVERSEAS_RC_ULTRA_YEARLY:your_ultra_yearly}"
      stripe-price-plus-monthly: "${STRIPE_PRICE_PLUS_MONTHLY:price_xxx}"
      stripe-price-plus-yearly: "${STRIPE_PRICE_PLUS_YEARLY:price_xxx}"
      stripe-price-pro-monthly: "${STRIPE_PRICE_PRO_MONTHLY:price_xxx}"
      stripe-price-pro-yearly: "${STRIPE_PRICE_PRO_YEARLY:price_xxx}"
      stripe-price-ultra-monthly: "${STRIPE_PRICE_ULTRA_MONTHLY:price_xxx}"
      stripe-price-ultra-yearly: "${STRIPE_PRICE_ULTRA_YEARLY:price_xxx}"
      stripe-secret-key: "${STRIPE_SECRET_KEY:sk_live_CHANGE_ME}"
      stripe-webhook-secret: "${STRIPE_WEBHOOK_SECRET:whsec_CHANGE_ME}"
      stripe-success-url: "${STRIPE_SUCCESS_URL:https://example.com/settings/membership?checkout=success}"
      stripe-cancel-url: "${STRIPE_CANCEL_URL:https://example.com/settings/membership?checkout=cancel}"
      stripe-billing-portal-return-url: "${STRIPE_BILLING_PORTAL_RETURN_URL:https://example.com/settings/membership}"
      expire-scan-ms: 60000
  storage:
    hosted-s3:
      enabled: ${HOSTED_S3_ENABLED:true}
      endpoint: "${HOSTED_S3_ENDPOINT:}"
      region: "${HOSTED_S3_REGION:auto}"
      access-key-id: "${HOSTED_S3_ACCESS_KEY_ID:}"
      secret-access-key: "${HOSTED_S3_SECRET_ACCESS_KEY:}"
      bucket: "${HOSTED_S3_BUCKET:}"
      download-presign-expire-seconds: 259200

sendcloud:
  api-user: "${SENDCLOUD_API_USER:}"
  api-key: "${SENDCLOUD_API_KEY:CHANGE_ME}"
  from: "${SENDCLOUD_FROM:noreply@example.com}"
  from-name: "${SENDCLOUD_FROM_NAME:YourAppName}"

tencent:
  sms:
    secret-id: ""
    secret-key: ""
    sms-sdk-app-id: ""
    template-id: ""
    sign-name: ""

storage:
  s3:
    endpoint: "${STORAGE_S3_ENDPOINT:}"
    region: "${STORAGE_S3_REGION:auto}"
    access-key-id: "${STORAGE_S3_ACCESS_KEY_ID:}"
    secret-access-key: "${STORAGE_S3_SECRET_ACCESS_KEY:}"
    bucket: "${STORAGE_S3_BUCKET:}"
    public-host: "${STORAGE_S3_PUBLIC_HOST:}"
    presign-expire-seconds: ${STORAGE_S3_PRESIGN_EXPIRE_SECONDS:1800}
    path-style-access-enabled: ${STORAGE_S3_PATH_STYLE:false}

centrifugo:
  url: http://localhost:8000
  http-api-key: "${CENTRIFUGO_HTTP_API_KEY:CHANGE_ME}"
  token-hmac-secret: "${CENTRIFUGO_TOKEN_HMAC_SECRET:CHANGE_ME}"
